name: Deploy disabled Worker

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Full 40-character release commit SHA authorized by the release gate
        required: true
        type: string
      release_gate_run_id:
        description: Successful Manual release gate workflow run ID or full Actions run URL
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  RELEASE_GATE_EVIDENCE_PATH: release-gate/manual-release-gate-evidence.json
  DEPLOYMENT_EVIDENCE_PATH: disabled-deployment-evidence.json

jobs:
  deploy-disabled:
    name: Deploy with public access disabled
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-disabled

    steps:
      - name: Check out deployment control plane
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Normalize and validate deployment inputs
        id: inputs
        env:
          RAW_RELEASE_COMMIT: ${{ inputs.release_commit }}
          RAW_RELEASE_GATE_RUN_ID: ${{ inputs.release_gate_run_id }}
        run: node scripts/disabled-worker-deployment.mjs --normalize-inputs

      - name: Check out exact normalized release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.inputs.outputs.release_commit }}

      - name: Download release-gate evidence
        uses: actions/download-artifact@v7
        with:
          name: manual-release-gate-evidence
          path: release-gate
          run-id: ${{ steps.inputs.outputs.release_gate_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Normalize release-gate evidence filename
        run: mv release-gate/release-gate-evidence.json release-gate/manual-release-gate-evidence.json

      - name: Run full repository test suite
        run: npm test

      - name: Authorize exact disabled deployment
        run: node scripts/disabled-worker-deployment.mjs --authorize

      - name: Validate disabled Cloudflare configuration and route
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const config = JSON.parse(fs.readFileSync("wrangler.jsonc", "utf8"));
          if (config.workers_dev !== false) throw new Error("workers_dev must remain false");
          if (config.vars?.ENABLE_PUBLIC_ASSISTANT !== "false") throw new Error("ENABLE_PUBLIC_ASSISTANT must remain false");
          if (String(config.vars?.ALLOWED_ORIGINS ?? "").trim() !== "") throw new Error("ALLOWED_ORIGINS must remain empty");
          const route = Array.isArray(config.routes)
            ? config.routes.find((item) => item?.pattern === "getgascert.com/api/assistant/*")
            : null;
          if (route?.zone_name !== "getgascert.com") {
            throw new Error("the exact GetGasCert assistant route must be configured");
          }
          NODE

      - name: Require Cloudflare deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }

      - name: Deploy exact release with public assistant disabled
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy --config wrangler.jsonc

      - name: Record privacy-safe deployment evidence
        run: node scripts/disabled-worker-deployment.mjs

      - name: Upload disabled-deployment evidence
        uses: actions/upload-artifact@v7
        with:
          name: disabled-worker-deployment-evidence
          path: disabled-deployment-evidence.json
          if-no-files-found: error
          retention-days: 30
