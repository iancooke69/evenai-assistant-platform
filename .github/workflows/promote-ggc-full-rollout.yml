name: Promote GetGasCert assistant to 100 percent

on:
  push:
    branches:
      - main
    paths:
      - deployment-authorizations/ggc-full-rollout-v1.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evenai-ggc-production-canary
  cancel-in-progress: false

env:
  FULL_ROLLOUT_AUTHORIZATION_PATH: deployment-authorizations/ggc-full-rollout-v1.json

jobs:
  promote-full-rollout:
    name: Verify and promote exact canary to 100 percent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-disabled

    steps:
      - name: Check out authorized control plane
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run full repository test suite
        env:
          GITHUB_STEP_SUMMARY: ""
          GITHUB_OUTPUT: ""
        run: npm test

      - name: Require explicit full rollout authorization
        run: test -s "$FULL_ROLLOUT_AUTHORIZATION_PATH"

      - name: Promote exact enabled canary to 100 percent
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROLLOUT_RUN_ID: ${{ github.run_id }}
        run: node scripts/promote-ggc-full-rollout.mjs --promote

      - name: Upload full rollout evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: ggc-full-rollout-evidence
          path: full-rollout-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Restore disabled stable version after failure
        if: ${{ failure() && hashFiles('full-rollout-plan.json') != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROLLOUT_RUN_ID: ${{ github.run_id }}
        run: node scripts/promote-ggc-full-rollout.mjs --rollback

      - name: Upload full rollout rollback evidence
        if: ${{ always() && hashFiles('full-rollout-rollback-evidence.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ggc-full-rollout-rollback-evidence
          path: full-rollout-rollback-evidence.json
          if-no-files-found: error
          retention-days: 90
