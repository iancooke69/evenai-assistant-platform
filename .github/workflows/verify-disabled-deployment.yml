name: Verify disabled Worker deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PRODUCTION_PROBE_URL: https://getgascert.com/api/assistant/v1/assist
  DEPLOYMENT_EVIDENCE_PATH: deployment-evidence/disabled-deployment-evidence.json
  RELEASE_CONFIG_PATH: release/wrangler.jsonc
  CLOUDFLARE_DEPLOYMENTS_PATH: cloudflare-deployments.json
  CLOUDFLARE_SETTINGS_PATH: cloudflare-settings.json
  VERIFICATION_EVIDENCE_PATH: disabled-deployment-verification-evidence.json
  WORKER_NAME: evenai-ggc-assistant

jobs:
  verify-disabled:
    name: Verify deployed Worker remains disabled
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-disabled

    steps:
      - name: Check out verification control plane and history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Discover latest successful disabled deployment evidence
        id: deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/resolve-disabled-deployment-evidence.mjs

      - name: Download exact disabled deployment evidence
        uses: actions/download-artifact@v5
        with:
          name: disabled-worker-deployment-evidence
          path: deployment-evidence
          run-id: ${{ steps.deployment.outputs.deployment_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Validate evidence and derive exact release commit
        id: evidence
        env:
          DEPLOYMENT_RUN_ID: ${{ steps.deployment.outputs.deployment_run_id }}
        run: node scripts/resolve-disabled-deployment-evidence.mjs --read-evidence

      - name: Materialize exact deployed release configuration
        env:
          RELEASE_COMMIT: ${{ steps.evidence.outputs.release_commit }}
          DEPLOYMENT_RUN_ID: ${{ steps.deployment.outputs.deployment_run_id }}
        run: |
          set -euo pipefail
          git cat-file -e "${RELEASE_COMMIT}^{commit}"
          mkdir -p release
          git show "${RELEASE_COMMIT}:wrangler.jsonc" > "$RELEASE_CONFIG_PATH"
          test -s "$RELEASE_CONFIG_PATH"
          echo "RELEASE_COMMIT=${RELEASE_COMMIT}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_RUN_ID=${DEPLOYMENT_RUN_ID}" >> "$GITHUB_ENV"

      - name: Run full repository test suite
        run: npm test

      - name: Require Cloudflare verification configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }

      - name: Read live Cloudflare deployment and bindings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}"
          curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${API_ROOT}/deployments" \
            --output "$CLOUDFLARE_DEPLOYMENTS_PATH"
          curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${API_ROOT}/settings" \
            --output "$CLOUDFLARE_SETTINGS_PATH"

      - name: Verify exact disabled deployment
        run: node scripts/verify-disabled-deployment.mjs

      - name: Require generated verification evidence
        if: success()
        run: test -s "$VERIFICATION_EVIDENCE_PATH"

      - name: Upload privacy-safe disabled verification evidence
        if: ${{ always() && hashFiles('disabled-deployment-verification-evidence.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: disabled-deployment-verification-evidence
          path: disabled-deployment-verification-evidence.json
          if-no-files-found: error
          retention-days: 30
