name: Deploy disabled Worker

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Full 40-character release commit SHA authorized by the release gate
        required: true
        type: string
      release_gate_run_id:
        description: Successful Manual release gate workflow run ID
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  RELEASE_COMMIT: ${{ inputs.release_commit }}
  RELEASE_GATE_RUN_ID: ${{ inputs.release_gate_run_id }}
  RELEASE_GATE_EVIDENCE_PATH: release-gate/manual-release-gate-evidence.json
  DEPLOYMENT_EVIDENCE_PATH: disabled-deployment-evidence.json

jobs:
  deploy-disabled:
    name: Deploy with public access disabled
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-disabled

    steps:
      - name: Check out exact release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_commit }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Download release-gate evidence
        uses: actions/download-artifact@v5
        with:
          name: manual-release-gate-evidence
          path: release-gate
          run-id: ${{ inputs.release_gate_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Run full repository test suite
        run: npm test

      - name: Authorize exact disabled deployment
        run: node scripts/disabled-worker-deployment.mjs --authorize

      - name: Validate disabled Cloudflare configuration
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const config = JSON.parse(fs.readFileSync("wrangler.jsonc", "utf8"));
          if (config.workers_dev !== false) throw new Error("workers_dev must remain false");
          if (config.vars?.ENABLE_PUBLIC_ASSISTANT !== "false") throw new Error("ENABLE_PUBLIC_ASSISTANT must remain false");
          NODE

      - name: Require Cloudflare deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }

      - name: Deploy exact release with public assistant disabled
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy --config wrangler.jsonc

      - name: Record privacy-safe deployment evidence
        run: node scripts/disabled-worker-deployment.mjs

      - name: Upload disabled-deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: disabled-worker-deployment-evidence
          path: disabled-deployment-evidence.json
          if-no-files-found: error
          retention-days: 30
