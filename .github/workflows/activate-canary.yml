name: Activate protected 5 percent canary

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: evenai-ggc-production-canary
  cancel-in-progress: false

env:
  VERIFICATION_EVIDENCE_PATH: verification-evidence/disabled-deployment-verification-evidence.json
  CANARY_AUTHORIZATION_PATH: canary-activation-authorization.json

jobs:
  activate-canary:
    name: Validate, authorize and activate bounded canary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-disabled

    steps:
      - name: Check out control plane and release history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Discover latest disabled deployment
        id: deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/resolve-disabled-deployment-evidence.mjs

      - name: Discover latest passing disabled verification
        id: verification
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/resolve-disabled-verification-evidence.mjs

      - name: Download exact disabled verification evidence
        uses: actions/download-artifact@v7
        with:
          name: disabled-deployment-verification-evidence
          path: verification-evidence
          run-id: ${{ steps.verification.outputs.verification_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Validate verification against latest disabled deployment
        id: evidence
        env:
          LATEST_DEPLOYMENT_RUN_ID: ${{ steps.deployment.outputs.deployment_run_id }}
        run: node scripts/resolve-disabled-verification-evidence.mjs --read-evidence

      - name: Run full repository test suite
        run: npm test

      - name: Create in-run bounded canary authorization
        env:
          VERIFICATION_RUN_ID: ${{ steps.verification.outputs.verification_run_id }}
          LATEST_DEPLOYMENT_RUN_ID: ${{ steps.deployment.outputs.deployment_run_id }}
        run: node scripts/authorize-canary-activation.mjs

      - name: Require generated in-run authorization
        run: test -s "$CANARY_AUTHORIZATION_PATH"

      - name: Normalize disabled baseline before activation
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RELEASE_COMMIT: ${{ steps.evidence.outputs.release_commit }}
          ACTIVATION_RUN_ID: ${{ github.run_id }}
        run: node scripts/normalize-canary-baseline.mjs

      - name: Release normalized deployment worktree
        run: |
          git worktree remove --force release-source || true
          rm -rf release-source
          git worktree prune

      - name: Execute protected canary activation
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RELEASE_COMMIT: ${{ steps.evidence.outputs.release_commit }}
          LATEST_DEPLOYMENT_RUN_ID: ${{ steps.deployment.outputs.deployment_run_id }}
          AUTHORIZATION_RUN_ID: ${{ github.run_id }}
          ACTIVATION_RUN_ID: ${{ github.run_id }}
          CANARY_AUTHORIZATION_PATH: ${{ env.CANARY_AUTHORIZATION_PATH }}
        run: node scripts/execute-canary-activation.mjs --activate

      - name: Upload canary activation evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: canary-activation-evidence
          path: canary-activation-evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Restore disabled stable version after failure
        if: ${{ failure() && hashFiles('canary-plan.json') != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ACTIVATION_RUN_ID: ${{ github.run_id }}
        run: node scripts/execute-canary-activation.mjs --rollback

      - name: Upload rollback evidence
        if: ${{ always() && hashFiles('canary-rollback-evidence.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: canary-rollback-evidence
          path: canary-rollback-evidence.json
          if-no-files-found: error
          retention-days: 30
