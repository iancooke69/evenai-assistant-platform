name: Repair GetGasCert assistant full rollout

on:
  push:
    branches:
      - main
    paths:
      - deployment-authorizations/ggc-full-rollout-repair-v1.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evenai-ggc-production-canary
  cancel-in-progress: false

env:
  FULL_ROLLOUT_REPAIR_AUTHORIZATION_PATH: deployment-authorizations/ggc-full-rollout-repair-v1.json

jobs:
  repair-full-rollout:
    name: Upload and verify fresh enabled version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-disabled

    steps:
      - name: Check out authorized control plane
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run full repository test suite
        env:
          GITHUB_STEP_SUMMARY: ""
          GITHUB_OUTPUT: ""
        run: npm test

      - name: Require explicit repair authorization
        run: test -s "$FULL_ROLLOUT_REPAIR_AUTHORIZATION_PATH"

      - name: Upload and deploy a fresh enabled version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REPAIR_RUN_ID: ${{ github.run_id }}
        run: node scripts/repair-ggc-full-rollout.mjs --repair

      - name: Upload repair evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: ggc-full-rollout-repair-evidence
          path: full-rollout-repair-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Restore previous disabled version after failure
        if: ${{ failure() && hashFiles('full-rollout-repair-plan.json') != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REPAIR_RUN_ID: ${{ github.run_id }}
        run: node scripts/repair-ggc-full-rollout.mjs --rollback

      - name: Upload rollback evidence
        if: ${{ always() && hashFiles('full-rollout-repair-rollback-evidence.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ggc-full-rollout-repair-rollback-evidence
          path: full-rollout-repair-rollback-evidence.json
          if-no-files-found: error
          retention-days: 90
